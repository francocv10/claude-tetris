<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-toggle" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle" aria-label="Cambiar tema claro/oscuro" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="game-container">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="combo-popup" class="combo-popup hidden"></div>
      </div>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">—</span>
        </div>

        <div class="panel-section challenge-hud hidden" id="challenge-hud">
          <span class="label">TIEMPO</span>
          <span class="value" id="challenge-timer">2:00</span>
          <span class="label">OBJETIVO</span>
          <span class="value" id="challenge-goal">0 / 40</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div class="overlay-actions">
          <button id="restart-btn">Reiniciar</button>
          <button id="menu-btn">Menú</button>
        </div>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>
        <button id="mode-classic">Modo Clásico</button>
        <span class="label">DESAFÍOS</span>
        <div id="challenge-list" class="challenge-list"></div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
